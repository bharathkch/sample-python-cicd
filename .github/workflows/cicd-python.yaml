name: CI/CD for Python Flask App

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest          # ← This is GitHub-hosted (free for public repos)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Docker Image
        run: docker build -t local-python-app:${{ github.sha }} .

      # Note: kubectl deploy part won't work on hosted runners because they don't have access to your local Rancher Desktop cluster.
      # You would need to either:
      # 1. Expose your Rancher cluster publicly (not recommended for local dev)
      # 2. Use self-hosted runner for kubectl steps
      # 3. Skip deployment step for testing hosted runners

      - name: Quick Test (local only example)
        run: echo "Workflow ran successfully on GitHub-hosted runner"
